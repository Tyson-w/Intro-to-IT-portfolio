<script>
function makeTable(){
    let skills = [
        ["HTML","Good"],
        ["CSS","Good"],
        ["JS","Basic"],
        ["Cybersecurity","Learning"]
    ];

    let t = "<table border='1'>";

    for(let i=0;i<skills.length;i++){
        t += "<tr><td>"+skills[i][0]+"</td><td>"+skills[i][1]+"</td></tr>";
    }

    t += "</table>";

    document.getElementById("skillsTable").innerHTML = t;
}

makeTable();
</script>
